services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/iti-job-portal
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
